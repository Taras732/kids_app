# Supabase project config
# Docs: https://supabase.com/docs/guides/cli/config
# Project: shkolyaryk (linked via `supabase link --project-ref <ref>`)

project_id = "shkolyaryk"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "shkolyaryk://"
additional_redirect_urls = [
  "shkolyaryk://auth/callback",
  "shkolyaryk://",
  "http://localhost:8081",
  "http://localhost:19006"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"

[auth.email.template.confirmation]
subject = "Підтвердьте email — Школярик"
content_path = "./supabase/templates/email_confirmation.html"

[auth.email.template.recovery]
subject = "Відновлення паролю — Школярик"
content_path = "./supabase/templates/email_reset_password.html"

[auth.email.template.magic_link]
subject = "Вхід у Школярик"
content_path = "./supabase/templates/email_magic_link.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"
